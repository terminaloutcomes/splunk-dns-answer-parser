[dnsparse-command]
syntax = dnsparse field=<field>
shortdesc = Parse a base64 DNS wire payload field and emit parsed values and records.
description = The dnsparse command decodes a base64 DNS response payload from the specified field, parses DNS resource records, and emits dnsparse_* fields with counts, values, and record summaries.
example1 = ... | dnsparse field=response_b64
comment1 = Parse DNS payloads from the response_b64 field.
